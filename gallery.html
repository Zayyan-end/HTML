        <h1>GAME SLIDE SHOW</h1>
        <section>
            <img class="mySlides" src="C:\Users\Owner\Downloads\mario.jpg" alt="Slide 1">
            <img class="mySlides" src="C:\Users\Owner\Downloads\dbs.png" alt="Slide 2">
            <img class="mySlides" src="C:\Users\Owner\Downloads\dbz.png" alt="Slide 3">
        </section>
        <script>


            let myIndex = 0;
            carousel();


            function carousel() {


                let i;
                let slides = document.getElementsByClassName("mySlides");


                // Hide all slides
                for (i = 0; i < slides.length; i++) {
                    slides[i].style.display = "none";
                }


                // Move to next slide
                myIndex++;


                // Restart slideshow
                if (myIndex > slides.length) {
                    myIndex = 1;
                }


                // Show current image
                slides[myIndex - 1].style.display = "block";


                // Change every 3 seconds
                setTimeout(carousel, 3000);
            }


        </script>

    </body>
</html>
