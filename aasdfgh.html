<!DOCTYPE html>
<html>
<h2>JavaScript loop</h2>
<p id="number"></p>
<script>
    var text = "";
    var i = 0;
    while (i < 20) {
        text += "<br>The number is " + Math.floor(Math.random() * 100);
        i++;

    }
    document.getElementById("number").innerHTML = text;
</script>

</html>
